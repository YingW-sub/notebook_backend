spring.jpa.show-sql=true
spring.jpa.database=mysql
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/demo?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia%2FShanghai&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.servlet.multipart.max-file-size=10GB
spring.servlet.multipart.max-request-size=10GB
mybatis.mapperLocations=classpath:mapper/*.xml
mybatis.typeAliasesPackage=redlib.backend.model
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
spring.jackson.serialization.fail_on_empty_beans=false
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER
springdoc.swagger-ui.enabled=true
logging.level.redlib=debug
server.port=9311

# =============================================
# AI大模型配置（支持多模型：Qwen / DeepSeek / Kimi）
# 所有模型均兼容 OpenAI API 协议，统一使用 spring-ai-openai-spring-boot-starter
# =============================================

# --- 默认模型（调用时不指定 model 参数时使用） ---
spring.ai.openai.api-key=${AI_API_KEY:sk-your-api-key-here}

# --- 阿里云通义千问（Qwen） ---
spring.ai.openai.chat.options.model=qwen-turbo
spring.ai.openai.chat.options.base-url=https://dashscope.aliyuncs.com/compatible-mode
# 下面是可选的默认参数模板（会被代码中显式设置的值覆盖）
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=500

# --- 自定义模型配置（供 AiConfig 读取，手动注册多实例 Bean） ---
# 阿里云通义千问（Qwen）
spring.ai.model.qwen.base-url=https://dashscope.aliyuncs.com/compatible-mode
spring.ai.model.qwen.api-key=${QWEN_API_KEY:sk-4116f7d8188e4c9087fb72c60f8f2f29}
spring.ai.model.qwen.model=qwen-plus

# DeepSeek
spring.ai.model.deepseek.base-url=https://api.deepseek.com
spring.ai.model.deepseek.api-key=${DEEPSEEK_API_KEY:sk-43666e6d926644798362a6e8c4cf4b35}
spring.ai.model.deepseek.model=deepseek-chat

# Kimi（Moonshot）
spring.ai.model.kimi.base-url=https://api.moonshot.cn
spring.ai.model.kimi.api-key=${KIMI_API_KEY:sk-L8vAyJOvFrN0zBzEPoPAN2r4usBkX3dUokIOTqPFqCZvf22V}
spring.ai.model.kimi.model=moonshot-v1-8k

# --- Prompt 配置 ---
ai.summary.prompt=请简要概括以下内容的要点，最多50字：
ai.polish.prompt=请帮我润色以下文本，使其语言更加专业、流畅，修正语病：
ai.category.prompt=请根据以下笔记内容，提取一个最适合的分类名称（不要包含多余标点，最多6个字）：

